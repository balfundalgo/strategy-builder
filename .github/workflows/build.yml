name: Build Strategy Builder EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller strategy_builder.spec --clean --noconfirm

      - name: Verify EXE was created
        run: |
          if (Test-Path "dist\BalfundStrategyBuilder.exe") {
            $size = (Get-Item "dist\BalfundStrategyBuilder.exe").length / 1MB
            Write-Host "EXE created: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "EXE not found!"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: BalfundStrategyBuilder-v1
          path: dist/BalfundStrategyBuilder.exe
          retention-days: 30
          if-no-files-found: error
